<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Wand - Ethereal Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        .mirror-container { position: relative; width: 100vw; height: 100vh; transform: scaleX(-1); }
        video { position: absolute; visibility: hidden; width: 1px; height: 1px; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        #startAudio {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.1); border: 1px solid white;
            color: white; padding: 12px 24px; border-radius: 30px;
            cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s;
        }

        .control-panel {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) scaleX(1); 
            width: 80%; max-width: 600px; background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; padding: 15px; display: flex; justify-content: space-around; z-index: 100;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; color: #00f2ff; font-size: 10px; }
        input[type="range"] { width: 80px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="mirror-container">
        <video id="input_video"></video>
        <canvas id="output_canvas"></canvas>
    </div>
    <button id="startAudio">开启水晶魔法 ✧</button>
    <div class="control-panel">
        <div class="control-group"><label>持久度</label><input type="range" id="persistence" min="1000" max="8000" value="4000"></div>
        <div class="control-group"><label>光晕</label><input type="range" id="glowIntensity" min="0" max="30" value="15"></div>
        <div class="control-group"><label>字号</label><input type="range" id="fontSize" min="10" max="40" value="18"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
