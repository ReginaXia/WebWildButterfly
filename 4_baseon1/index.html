<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Wand - Crystal Sound Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        :root { --y2k-blue: #00f2ff; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: #050505; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        .mirror-container { position: relative; width: 100vw; height: 100vh; transform: scaleX(-1); }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        /* 初始启动按钮 */
        #startAudio {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2000; background: var(--y2k-blue); border: none;
            color: black; padding: 20px 40px; border-radius: 50px;
            cursor: pointer; font-weight: bold; font-size: 1.2rem;
            box-shadow: 0 0 30px var(--y2k-blue); transition: 0.3s;
        }

        .control-panel {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 700px; background: var(--glass);
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; padding: 15px; display: flex; justify-content: space-around;
            align-items: center; z-index: 100;
        }
        .control-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .control-group label { font-size: 9px; color: var(--y2k-blue); letter-spacing: 1px; }
        input[type="range"] { width: 80px; }
    </style>
</head>
<body>
    <button id="startAudio">START CRYSTAL MAGIC ✧</button>

    <div class="mirror-container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div class="control-panel">
        <div class="control-group">
            <label>Persistence</label>
            <input type="range" id="persistence" min="1000" max="10000" value="5000">
        </div>
        <div class="control-group">
            <label>Glow</label>
            <input type="range" id="glowIntensity" min="0" max="30" value="15">
        </div>
        <div class="control-group">
            <label>Size</label>
            <input type="range" id="fontSize" min="10" max="40" value="18">
        </div>
        <div class="control-group">
            <label>Colors</label>
            <div style="display: flex; gap: 5px;">
                <input type="color" id="color1" value="#00f2ff">
                <input type="color" id="color2" value="#ff00e5">
                <input type="color" id="color3" value="#ffff00">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
