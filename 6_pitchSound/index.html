<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Wand - Ethereal Wonderland Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        :root { --y2k-blue: #00f2ff; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: #050505; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        .mirror-container { position: relative; width: 100vw; height: 100vh; transform: scaleX(-1); }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        #startAudio {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2000; background: linear-gradient(45deg, var(--y2k-blue), #FFB6C1); 
            border: none; padding: 20px 40px; color: white; font-weight: bold;
            cursor: pointer; border-radius: 50px; box-shadow: 0 0 30px rgba(0,242,255,0.5);
            letter-spacing: 2px;
        }

        .control-panel {
            position: fixed; top: 20px; right: 20px; width: 150px;
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column; gap: 15px; z-index: 100;
        }

        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .control-group label { font-size: 10px; color: var(--y2k-blue); text-transform: uppercase; }
        input[type="range"] { width: 100%; cursor: pointer; }

        /* 和弦模式按钮样式 */
        .mode-buttons { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; margin-top: 5px; }
        .mode-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #eee; font-size: 9px; padding: 5px 2px; cursor: pointer; border-radius: 4px;
            transition: all 0.3s;
        }
        .mode-btn.active {
            background: var(--y2k-blue); color: #000; font-weight: bold;
            box-shadow: 0 0 10px var(--y2k-blue);
        }
    </style>
</head>
<body>
    <button id="startAudio">开启梦幻仙境 ✧</button>

    <div class="mirror-container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div class="control-panel">
        <div class="control-group">
            <label>和弦模式</label>
            <div class="mode-buttons">
                <button class="mode-btn active" onclick="setMode('dream')">Dream</button>
                <button class="mode-btn" onclick="setMode('arctic')">Arctic</button>
                <button class="mode-btn" onclick="setMode('galaxy')">Galaxy</button>
                <button class="mode-btn" onclick="setMode('forest')">Forest</button>
                <button class="mode-btn" onclick="setMode('magic')">Magic</button>
            </div>
        </div>
        <div class="control-group">
            <label>Pluck Pitch (音调)</label>
            <input type="range" id="pluckPitch" min="0.5" max="4.0" step="0.1" value="2.0">
        </div>
        <div class="control-group">
            <label>Glow Pitch (氛围)</label>
            <input type="range" id="glowPitch" min="0.2" max="2.0" step="0.1" value="0.5">
        </div>
        <div class="control-group">
            <label>轨迹长度</label>
            <input type="range" id="persistence" min="1000" max="8000" value="4000">
        </div>
        <div class="control-group">
            <label>字符大小</label>
            <input type="range" id="fontSize" min="10" max="40" value="20">
        </div>
        <div class="control-group">
            <label>Jitter (电子抖动)</label>
            <input type="range" id="jitterIntensity" min="0" max="15" step="0.5" value="2">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
